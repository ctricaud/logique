<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeu Éducatif – Maths, Français, Anglais</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ══════════════════════════════════════════
       ACCUEIL — 3 COLONNES
    ══════════════════════════════════════════ */
    #screen-welcome {
      text-align: center;
    }

    /* Titre élargi pour accueillir 3 colonnes */
    #app { max-width: 1100px; }

    .matieres-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      margin: 0 auto 32px;
    }

    @media (max-width: 760px) {
      .matieres-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
    }

    /* ── Colonne matière ── */
    .matiere-col {
      background: #111111;
      border: 2px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .matiere-col-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }

    /* Couleurs de colonne */
    .col-maths   { border-color: #00c864; }
    .col-francais { border-color: #ffa000; }
    .col-anglais { border-color: #00a0ff; }

    .col-maths .matiere-col-title   { color: #00c864; }
    .col-francais .matiere-col-title { color: #ffa000; }
    .col-anglais .matiere-col-title  { color: #00a0ff; }

    /* ── Cartes de banque ── */
    .banque-item input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .banque-item {
      cursor: pointer;
      display: block;
    }
    .banque-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 12px;
      background: #1a1a1a;
      border: 2px solid #333333;
      border-radius: 10px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
      text-align: center;
    }
    .banque-item:hover .banque-card {
      background: #222222;
      transform: translateY(-2px);
    }
    .col-maths    .banque-item input[type="radio"]:checked + .banque-card { border-color: #00c864; background: rgba(0,200,100,0.08); }
    .col-francais .banque-item input[type="radio"]:checked + .banque-card { border-color: #ffa000; background: rgba(255,160,0,0.08); }
    .col-anglais  .banque-item input[type="radio"]:checked + .banque-card { border-color: #00a0ff; background: rgba(0,160,255,0.08); }

    .banque-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    /* Badge couleurs par colonne */
    .col-maths    .banque-badge { background: rgba(0,200,100,0.15); border: 2px solid #00c864; color: #00c864; }
    .col-francais .banque-badge { background: rgba(255,160,0,0.15);  border: 2px solid #ffa000; color: #ffa000; }
    .col-anglais  .banque-badge { background: rgba(0,160,255,0.15);  border: 2px solid #00a0ff; color: #00a0ff; }

    .banque-desc {
      font-size: 0.85rem;
      color: #aaaaaa;
      line-height: 1.3;
    }

    /* Bouton Jouer */
    #btn-start:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }
    #btn-start:disabled:hover {
      background: transparent;
      color: #ffdd00;
    }

    /* Responsive badge */
    @media (max-width: 500px) {
      .banque-card { padding: 12px 8px; }
      .banque-badge { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── ÉCRAN D'ACCUEIL ───────────────────── -->
  <section id="screen-welcome" class="screen active">

    <span class="welcome-emoji" role="img" aria-label="cerveau">🎓</span>
    <h1 class="game-title">Jeu Éducatif</h1>
    <p class="game-subtitle">Maths · Français · Anglais</p>

    <!-- Sélecteur 3 colonnes -->
    <div class="matieres-grid">

      <!-- ── Colonne MATHS ── -->
      <div class="matiere-col col-maths">
        <div class="matiere-col-title">🔢 Maths</div>

        <label class="banque-item">
          <input type="radio" name="banque" value="ce1" />
          <span class="banque-card">
            <span class="banque-badge">CE1</span>
            <span class="banque-desc">200 questions · débutant</span>
          </span>
        </label>

        <label class="banque-item">
          <input type="radio" name="banque" value="ce2" />
          <span class="banque-card">
            <span class="banque-badge">CE2</span>
            <span class="banque-desc">200 questions · intermédiaire</span>
          </span>
        </label>

        <label class="banque-item">
          <input type="radio" name="banque" value="ce1ce2" />
          <span class="banque-card">
            <span class="banque-badge">CE1 + CE2</span>
            <span class="banque-desc">400 questions · mélangés</span>
          </span>
        </label>

        <label class="banque-item">
          <input type="radio" name="banque" value="mixte" />
          <span class="banque-card">
            <span class="banque-badge">CE1→CM1</span>
            <span class="banque-desc">200 questions · tous niveaux</span>
          </span>
        </label>
      </div>

      <!-- ── Colonne FRANÇAIS ── -->
      <div class="matiere-col col-francais">
        <div class="matiere-col-title">🇫🇷 Français</div>

        <label class="banque-item">
          <input type="radio" name="banque" value="fr_ce1" />
          <span class="banque-card">
            <span class="banque-badge">CE1</span>
            <span class="banque-desc">200 questions · grammaire, ortho, conjugaison</span>
          </span>
        </label>

        <label class="banque-item">
          <input type="radio" name="banque" value="fr_ce2" />
          <span class="banque-card">
            <span class="banque-badge">CE2</span>
            <span class="banque-desc">200 questions · niveau avancé</span>
          </span>
        </label>

        <label class="banque-item">
          <input type="radio" name="banque" value="fr_ce1ce2" />
          <span class="banque-card">
            <span class="banque-badge">CE1 + CE2</span>
            <span class="banque-desc">400 questions · mélangés</span>
          </span>
        </label>
      </div>

      <!-- ── Colonne ANGLAIS ── -->
      <div class="matiere-col col-anglais">
        <div class="matiere-col-title">🇬🇧 Anglais</div>

        <label class="banque-item">
          <input type="radio" name="banque" value="en_ce1" />
          <span class="banque-card">
            <span class="banque-badge">CE1</span>
            <span class="banque-desc">200 questions · vocabulaire &amp; bases</span>
          </span>
        </label>

        <label class="banque-item">
          <input type="radio" name="banque" value="en_ce2" />
          <span class="banque-card">
            <span class="banque-badge">CE2</span>
            <span class="banque-desc">200 questions · grammaire &amp; lecture</span>
          </span>
        </label>

        <label class="banque-item">
          <input type="radio" name="banque" value="en_ce1ce2" />
          <span class="banque-card">
            <span class="banque-badge">CE1 + CE2</span>
            <span class="banque-desc">400 questions · mélangés</span>
          </span>
        </label>
      </div>

    </div><!-- /.matieres-grid -->

    <div class="welcome-info">
      <p>🎯 <strong>10 questions</strong> par partie</p>
      <p>✅ Choix multiples — clique sur la bonne réponse</p>
      <p>🏆 Score final sur <strong>10</strong></p>
    </div>

    <button id="btn-start" class="btn btn-large" disabled>▶ Jouer !</button>

  </section>

  <!-- ── CHARGEMENT ────────────────────────── -->
  <section id="loading" class="screen">
    <div style="text-align:center; padding:80px 20px;">
      <div class="spinner"></div>
      <p style="font-size:1.4rem; color:#cccccc;">Chargement des questions…</p>
    </div>
  </section>

  <!-- ── ÉCRAN DE JEU ──────────────────────── -->
  <section id="screen-game" class="screen">

    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span id="progress-label">Question 1 / 10</span>
        <span id="question-num"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-meta">
        <span class="badge badge-cat" id="question-cat">Catégorie</span>
        <span class="badge badge-niveau" id="question-niveau">CE1</span>
      </div>
      <p class="question-text" id="question-text">Question…</p>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <div class="feedback-box" id="feedback-box">
      <div id="feedback-text"></div>
      <div class="feedback-explication" id="feedback-explication"></div>
    </div>

    <button id="btn-next" class="btn btn-large">Question suivante →</button>

  </section>

  <!-- ── ÉCRAN DE SCORE ────────────────────── -->
  <section id="screen-score" class="screen">

    <span id="score-emoji" class="score-emoji" role="img">🏆</span>
    <h2 id="score-title" class="score-title">Excellent !</h2>

    <div class="score-display">
      <span id="score-num" class="score-num">0</span>
      <span class="score-denom"> / 10</span>
    </div>

    <p id="score-message" class="score-message">Super travail !</p>

    <div class="score-dots" id="score-dots"></div>

    <div class="score-actions">
      <button id="btn-replay" class="btn btn-large">🔄 Rejouer</button>
      <button id="btn-home" class="btn btn-secondary">🏠 Accueil</button>
    </div>

  </section>

</div><!-- /#app -->

<script src="game.js"></script>
</body>
</html>
